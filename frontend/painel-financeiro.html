<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Financeiro - Integra</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <div class="painel">
    <div class="painel-sidebar">
      <h3>💰 Financeiro</h3>
      <nav>
        <a href="#" class="ativo">📊 Dashboard</a>
        <a href="#">🧾 Notas Fiscais</a>
        <a href="#">💳 Pagamentos</a>
        <a href="#" onclick="logout()">🚪 Sair</a>
      </nav>
    </div>
    <div class="painel-conteudo">
      <h2>Dashboard Financeiro</h2>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:20px 0;">
        <div class="card"><h3>Faturamento Total</h3><p style="font-size:28px;" id="fin-fat">-</p></div>
        <div class="card"><h3>Pagamentos Hoje</h3><p style="font-size:28px;" id="fin-hoje">-</p></div>
        <div class="card"><h3>Pendentes</h3><p style="font-size:28px;" id="fin-pendentes">-</p></div>
      </div>
      <div class="card"><h3>Últimas Transações</h3><div id="lista-transacoes"></div></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    function logout() { localStorage.clear(); window.location.href = 'index.html'; }
    async function carregar() {
      var token = localStorage.getItem('integra_token');
      if (!token) { window.location.href = 'login.html'; return; }
      var r = await fetch(`${CONFIG.API_URL}/financeiro/meus-pagamentos`, { headers: { 'Authorization': `Bearer ${token}` } });
      var dados = await r.json();
      var total = dados.reduce((s, p) => s + (p.valor || 0), 0);
      var hoje = dados.filter(p => p.criado_em?.startsWith(new Date().toISOString().split('T')[0])).length;
      document.getElementById('fin-fat').textContent = 'R$ ' + total.toFixed(2);
      document.getElementById('fin-hoje').textContent = hoje;
      document.getElementById('fin-pendentes').textContent = dados.filter(p => p.status === 'pendente').length;
      document.getElementById('lista-transacoes').innerHTML = dados.slice(0,10).map(p => `<p style="font-size:13px;">${p.tipo} — R$ ${p.valor} — ${p.status}</p>`).join('') || '<p>Nenhuma</p>';
    }
    carregar();
  </script>
</body>
</html>
