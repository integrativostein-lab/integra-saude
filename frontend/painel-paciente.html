<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Painel - Integra</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <div class="painel">
    <div class="painel-sidebar">
      <h3>🌿 Integra</h3>
      <nav>
        <a href="#" class="ativo">📅 Meus Agendamentos</a>
        <a href="busca.html">🔍 Buscar Profissionais</a>
        <a href="#" onclick="logout()">🚪 Sair</a>
      </nav>
    </div>
    <div class="painel-conteudo">
      <h2>Meus Agendamentos</h2>
      <div id="lista-agendamentos" style="margin-top:20px;"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function carregarAgendamentos() {
      const token = localStorage.getItem('integra_token');
      if (!token) { window.location.href = 'login.html'; return; }

      const r = await fetch(`${CONFIG.API_URL}/agendamentos/meus`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      const dados = await r.json();

      const div = document.getElementById('lista-agendamentos');
      if (dados.length === 0) {
        div.innerHTML = '<p style="color:var(--texto-medio);">Nenhum agendamento encontrado.</p>';
        return;
      }

      div.innerHTML = dados.map(a => `
        <div style="background:var(--branco);padding:18px;border-radius:var(--raio-borda);box-shadow:var(--sombra);margin-bottom:10px;">
          <strong>${a.data_agendamento}</strong> às ${a.horario_inicio} — ${a.modalidade}<br>
          <span style="font-size:13px;color:var(--texto-medio);">Profissional: ${a.profissional_nome || 'N/A'} | Status: ${a.status} | Valor: R$ ${a.valor}</span>
        </div>
      `).join('');
    }

    function logout() {
      localStorage.removeItem('integra_token');
      localStorage.removeItem('integra_usuario');
      window.location.href = 'index.html';
    }

    carregarAgendamentos();
  </script>
</body>
</html>
