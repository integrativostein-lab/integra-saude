<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Integra</title>
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    .form-login { max-width: 420px; margin: 60px auto; background: var(--branco); padding: 36px; border-radius: var(--raio-borda); box-shadow: var(--sombra); }
    .form-login h2 { text-align: center; margin-bottom: 24px; }
    .msg { padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .msg.sucesso { background: #C6F6D5; color: #22543D; }
    .msg.erro { background: #FED7D7; color: #9B2C2C; }
    .senha-wrapper { position: relative; }
    .senha-wrapper input { width: 100%; padding-right: 40px; }
    .senha-wrapper .olhinho { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; background: none; border: none; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🌿 Integra<span>.</span></div>
    <div class="menu"><a href="index.html">Início</a></div>
  </nav>

  <div class="form-login">
    <h2>Entrar</h2>
    <div id="msg" class="msg" style="display:none;"></div>
    
    <div class="form-grupo">
      <label>Email</label>
      <input type="email" id="email" placeholder="admin@integra.com" required>
    </div>
    <div class="form-grupo">
      <label>Senha</label>
      <div class="senha-wrapper">
        <input type="password" id="senha" placeholder="Sua senha" required>
        <button class="olhinho" onclick="toggleSenha()" type="button">👁️</button>
      </div>
    </div>

    <button class="btn btn-primario" onclick="login()" style="width:100%;margin-top:10px;">Entrar</button>
    <p style="text-align:center;margin-top:16px;font-size:13px;">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
  </div>

  <script src="js/config.js"></script>
  <script>
    function toggleSenha() {
      var s = document.getElementById('senha');
      var btn = document.querySelector('.olhinho');
      if (s.type === 'password') { s.type = 'text'; btn.textContent = '🙈'; }
      else { s.type = 'password'; btn.textContent = '👁️'; }
    }

    async function login() {
      var msg = document.getElementById('msg');
      msg.style.display = 'block';
      msg.className = 'msg';
      msg.textContent = 'Entrando...';

      var email = document.getElementById('email').value.trim();
      var senha = document.getElementById('senha').value.trim();

      if (!email || !senha) {
        msg.className = 'msg erro';
        msg.textContent = 'Preencha email e senha.';
        return;
      }

      try {
        var r = await fetch(`${CONFIG.API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, senha: senha })
        });
        var d = await r.json();

        if (r.ok) {
          localStorage.setItem('integra_token', d.token);
          localStorage.setItem('integra_usuario', JSON.stringify(d.usuario));
          msg.className = 'msg sucesso';
if (d.usuario.tipo === 'paciente') {
  msg.innerHTML = '✅ Login realizado! <a href="painel-paciente.html">Ir para meu painel</a>';
} else {
  msg.innerHTML = '✅ Login realizado! <a href="painel-terapeuta.html">Ir para meu painel</a>';
}        } else {
          msg.className = 'msg erro';
          msg.textContent = d.erro || 'Erro ao fazer login.';
        }
      } catch(e) {
        msg.className = 'msg erro';
        msg.textContent = 'Erro de conexão. O servidor está rodando?';
      }
    }
  </script>
</body>
</html>
