<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buscar Profissionais - Integra</title>
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    .busca-container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .filtros { background: var(--branco); padding: 24px; border-radius: var(--raio-borda); box-shadow: var(--sombra); margin-bottom: 24px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filtros .form-grupo { margin-bottom: 0; flex: 1; min-width: 150px; }
    .resultado-card { background: var(--branco); padding: 24px; border-radius: var(--raio-borda); box-shadow: var(--sombra); margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 14px; }
    .resultado-card h3 { color: var(--azul-escuro); margin-bottom: 4px; }
    .resultado-card p { color: var(--texto-medio); font-size: 13px; }
    .sem-resultados { text-align: center; padding: 40px; color: var(--texto-medio); }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🌿 Integra<span>.</span></div>
    <div class="menu">
      <a href="index.html">Início</a>
      <a href="cadastro.html">Cadastro</a>
      <a href="login.html">Entrar</a>
    </div>
  </nav>

  <div class="busca-container">
    <h2 style="margin-bottom:20px;">Buscar Profissionais</h2>

    <div class="filtros">
      <div class="form-grupo">
        <label>Especialidade</label>
        <select id="filtro-especialidade">
          <option value="">Todas</option>
          <option value="Fitoterapia">Fitoterapia</option>
          <option value="Ayurveda">Ayurveda</option>
          <option value="MTC">MTC</option>
          <option value="Massoterapia">Massoterapia</option>
          <option value="Yoga">Yoga</option>
          <option value="Fisioterapia">Fisioterapia</option>
          <option value="Acupuntura">Acupuntura</option>
          <option value="Psicologia">Psicologia</option>
          <option value="Nutrição">Nutrição</option>
        </select>
      </div>
      <div class="form-grupo">
        <label>Modalidade</label>
        <select id="filtro-modalidade">
          <option value="">Todas</option>
          <option value="online">Online</option>
          <option value="presencial">Presencial</option>
        </select>
      </div>
      <button class="btn btn-primario" onclick="buscar()">Buscar</button>
    </div>

    <div id="resultados"></div>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function buscar() {
      const esp = document.getElementById('filtro-especialidade').value;
      const mod = document.getElementById('filtro-modalidade').value;
      const params = new URLSearchParams();
      if (esp) params.append('especialidade', esp);
      if (mod) params.append('modalidade', mod);

      const r = await fetch(`${CONFIG.API_URL}/profissionais/buscar?${params.toString()}`);
      const dados = await r.json();

      const div = document.getElementById('resultados');

      if (dados.length === 0) {
        div.innerHTML = '<div class="sem-resultados">Nenhum profissional encontrado.</div>';
        return;
      }

      div.innerHTML = dados.map(p => `
        <div class="resultado-card">
          <div>
            <h3>${p.nome}</h3>
            <p>${p.especialidades_lista?.join(', ') || 'Não informado'}</p>
            <p>${p.cidade || ''} ${p.estado || ''}</p>
            <p>🟢 Online: ${p.atende_online ? 'Sim' : 'Não'} | 📍 Presencial: ${p.atende_presencial ? 'Sim' : 'Não'}</p>
            ${p.valores?.length ? p.valores.map(v => `<span style="font-size:12px;color:var(--laranja);">${v.especialidade_nome}: Online R$${v.valor_online} | Presencial R$${v.valor_presencial}</span>`).join('<br>') : '<p style="font-size:12px;">Valores não configurados</p>'}
          </div>
          <a href="#" class="btn btn-primario" style="font-size:13px;">Agendar</a>
        </div>
      `).join('');
    }

    buscar();
  </script>
</body>
</html>
