<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — Integrativo.App</title>
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    .checkout-container { max-width: 650px; margin: 40px auto; padding: 0 20px; }
    .checkout-card { background: var(--branco); padding: 36px; border-radius: var(--raio-borda); box-shadow: var(--sombra); margin-bottom: 20px; }
    .checkout-card h2 { margin-bottom: 8px; }
    .resumo { background: var(--cinza-claro); padding: 16px; border-radius: 8px; margin: 16px 0; font-size: 14px; }
    .resumo span { float: right; font-weight: 600; }
    .cupom { margin: 16px 0; }
    .cupom input { padding: 10px; border: 2px solid #E2E8F0; border-radius: 8px; width: 60%; }
    .cupom button { padding: 10px 16px; background: var(--azul-escuro); color: #FFF; border: none; border-radius: 8px; cursor: pointer; }
    .forma-pagamento { margin: 16px 0; }
    .forma-pagamento label { display: block; margin-bottom: 8px; font-weight: 600; cursor: pointer; }
    .btn-pix { background: #38A169; }
    .btn-pix:hover { background: #2F855A; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">🌿 Integrativo<span>.</span>App</div>
    <div class="menu"><a href="index.html">Início</a> <a href="profissionais.html">Planos</a></div>
  </nav>

  <div class="checkout-container">
    <div class="checkout-card">
      <h2>Finalizar Assinatura</h2>
      <p style="color:var(--texto-medio);">Plano escolhido: <strong id="plano-nome">Pro</strong></p>

      <div class="resumo">
        <p>Valor mensal: <span id="resumo-mensal">R$ 89,90</span></p>
        <p id="linha-anual">Plano Anual: <span id="resumo-anual">R$ 863,04</span> <small style="color:var(--verde-suave);">(20% off)</small></p>
        <p id="linha-pix" style="display:none;color:var(--verde-suave);">Pagamento via PIX: <span id="resumo-pix">5% off adicional</span></p>
      </div>

      <div class="form-grupo">
        <label>Ciclo</label>
        <select id="ciclo" onchange="atualizarResumo()">
          <option value="mensal">Mensal</option>
          <option value="anual">Anual (20% off)</option>
        </select>
      </div>

      <div class="form-grupo" id="grupo-parcelas" style="display:none;">
        <label>Parcelas (até 4x sem juros)</label>
        <select id="parcelas" onchange="atualizarResumo()">
          <option value="1">1x (à vista)</option>
          <option value="2">2x</option>
          <option value="3">3x</option>
          <option value="4">4x</option>
        </select>
        <p id="info-parcelas" style="font-size:12px;color:var(--texto-medio);margin-top:4px;"></p>
      </div>

      <div class="cupom">
        <label>Cupom de desconto</label><br>
        <input type="text" id="cupom" placeholder="PRESENTEDOMAU">
        <button onclick="aplicarCupom()">Aplicar</button>
        <p id="msg-cupom" style="font-size:12px;margin-top:4px;"></p>
      </div>

      <div class="forma-pagamento">
        <label>Forma de Pagamento</label>
        <label><input type="radio" name="pgto" value="pix" onchange="atualizarResumo()"> PIX (5% off adicional)</label>
        <label><input type="radio" name="pgto" value="cartao" checked onchange="atualizarResumo()"> Cartão de Crédito</label>
      </div>

      <button class="btn btn-primario" onclick="finalizar()" style="width:100%;margin-top:10px;">Finalizar Pagamento</button>
      <p style="font-size:12px;color:var(--texto-medio);margin-top:8px;">🔒 Dados do cartão não são armazenados por nós.</p>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    var plano = 'pro';
    var valorMensal = CONFIG.PLANOS[plano].valor_mensal;
    var valorAnual = CONFIG.PLANOS[plano].valor_anual;
    var pixOff = false;

    function atualizarResumo() {
      var ciclo = document.getElementById('ciclo').value;
      var parcelas = parseInt(document.getElementById('parcelas').value) || 1;
      var pgto = document.querySelector('input[name="pgto"]:checked').value;
      pixOff = (pgto === 'pix');

      document.getElementById('grupo-parcelas').style.display = ciclo === 'anual' ? 'block' : 'none';
      document.getElementById('linha-pix').style.display = pixOff ? 'block' : 'none';
      document.getElementById('linha-anual').style.display = ciclo === 'anual' ? 'block' : 'none';

      var base = ciclo === 'anual' ? valorAnual : valorMensal;
      if (pixOff) base = base * 0.95;
      document.getElementById('resumo-mensal').textContent = 'R$ ' + (ciclo === 'mensal' ? base.toFixed(2) : valorMensal.toFixed(2));
      document.getElementById('resumo-anual').textContent = 'R$ ' + base.toFixed(2);
      document.getElementById('resumo-pix').textContent = 'R$ ' + base.toFixed(2);

      if (ciclo === 'anual' && parcelas > 1) {
        var vp = (base / parcelas).toFixed(2);
        document.getElementById('info-parcelas').textContent = parcelas + 'x de R$ ' + vp + ' (sem juros)';
      } else {
        document.getElementById('info-parcelas').textContent = '';
      }
    }

    function aplicarCupom() {
      var cod = document.getElementById('cupom').value.toUpperCase();
      var msg = document.getElementById('msg-cupom');
      if (cod === 'PRESENTEDOMAU') {
        msg.textContent = '✅ Cupom aplicado! Acesso vitalício.';
        msg.style.color = 'var(--verde-suave)';
        document.getElementById('resumo-mensal').textContent = 'R$ 0,00';
        document.getElementById('resumo-anual').textContent = 'R$ 0,00 (vitalício)';
      } else {
        msg.textContent = '❌ Cupom inválido.';
        msg.style.color = 'var(--vermelho)';
      }
    }

    async function finalizar() {
      var token = localStorage.getItem('integra_token');
      if (!token) { alert('Faça login primeiro.'); return; }
      var ciclo = document.getElementById('ciclo').value;
      var parcelas = parseInt(document.getElementById('parcelas').value) || 1;
      var cupom = document.getElementById('cupom').value.toUpperCase();
      var r = await fetch(`${CONFIG.API_URL}/financeiro/renovar-assinatura`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ plano: plano, tipo_ciclo: ciclo, parcelas: parcelas, codigo_cupom: cupom === 'PRESENTEDOMAU' ? cupom : '', pix: pixOff })
      });
      var d = await r.json();
      if (r.ok) { alert('✅ Assinatura ativada!'); window.location.href = 'boas-vindas.html'; }
      else { alert('Erro: ' + (d.erro || 'Tente novamente.')); }
    }

    document.getElementById('ciclo').addEventListener('change', atualizarResumo);
    atualizarResumo();
  </script>
</body>
</html>
